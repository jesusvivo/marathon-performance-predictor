name: CI
on: [push, pull_request]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv sync --group dev --group serving --group feast
      - run: uv run ruff check .
      - run: uv run mypy src scripts
      - run: uv run pytest -q